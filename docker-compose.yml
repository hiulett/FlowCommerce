version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: flowcommerce_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flowcommerce
      POSTGRES_USER: flowadmin
      POSTGRES_PASSWORD: flowpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - flow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowadmin -d flowcommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: flowcommerce_cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - flow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  flow_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
